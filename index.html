<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / Mobile App -->
  <meta name="theme-color" content="#0369a1" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="제작현황" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Manifest & Icons -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />

  <title>한성쇼케이스 - 제작현황 관리</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Splash screen inline styles (shown before React loads) -->
  <style>
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #075985 0%, #0ea5e9 50%, #0891b2 100%);
      z-index: 99999;
      transition: opacity 0.5s ease, transform 0.5s ease;
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
    }
    #splash.hide {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }
    #splash .logo {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.15);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 900;
      font-size: 28px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      animation: splashBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    #splash .title {
      color: white;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      opacity: 0;
      animation: splashFade 0.4s 0.3s ease both;
    }
    #splash .sub {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-weight: 500;
      margin-top: 6px;
      opacity: 0;
      animation: splashFade 0.4s 0.5s ease both;
    }
    #splash .loader {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      margin-top: 40px;
      opacity: 0;
      animation: splashSpin 0.8s linear infinite, splashFade 0.3s 0.7s ease both;
    }
    @keyframes splashBounce {
      0% { opacity: 0; transform: scale(0.5); }
      60% { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes splashFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes splashSpin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Native splash screen -->
  <div id="splash">
    <div class="logo">HS</div>
    <div class="title">한성쇼케이스</div>
    <div class="sub">제작현황 관리 시스템</div>
    <div class="loader"></div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => {
            console.log('SW registered:', reg.scope);
            // Check for updates periodically
            setInterval(() => reg.update(), 60 * 60 * 1000);
          })
          .catch((err) => console.warn('SW registration failed:', err));
      });
    }

    // Hide splash screen when app is ready
    window.addEventListener('app-ready', () => {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hide');
        setTimeout(() => splash.remove(), 600);
      }
    });

    // Fallback: hide splash after timeout
    setTimeout(() => {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hide');
        setTimeout(() => splash.remove(), 600);
      }
    }, 1500);
  </script>
</body>
</html>
